<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Char Pair Login</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/sign-in.css" />

    <script>
      function togglePassword() {
        const passwordInput = document.getElementById("password");
        const eyeIcon = document.getElementById("eyeIcon");

        if (passwordInput.type === "password") {
          passwordInput.type = "text";
          eyeIcon.classList.remove("bi-eye");
          eyeIcon.classList.add("bi-eye-slash");
        } else {
          passwordInput.type = "password";
          eyeIcon.classList.remove("bi-eye-slash");
          eyeIcon.classList.add("bi-eye");
        }
      }
    </script>
  </head>

  <body>
    <div class="container-fluid login-wrapper">
      <div class="row min-vh-100 align-items-center">
        <!-- LEFT -->
        <div class="col-lg-6 col-md-12 px-5">
          <!-- Logo -->
          <div class="mb-5 text-center text-lg-start">
            <img src="/images/logo.png" class="logo-img" />
          </div>

          <!-- Form -->
          <div class="login-box mx-auto">
            <h6 class="text-center mb-4">Login</h6>

            <input
              type="text"
              class="form-control mb-3"
              placeholder="Ram Sharma"
            />

            <div class="position-relative mb-3">
              <input
                type="password"
                class="form-control pe-5"
                id="password"
                placeholder="********"
              />

              <span class="toggle-password" onclick="togglePassword()">
                <i id="eyeIcon" class="bi bi-eye"></i>
              </span>
            </div>

            <button class="btn btn-primary w-100 mb-3">Login</button>

            <p class="text-center small">
              Don’t have an account?
              <a href="#">Create a account</a>
            </p>

            <div class="divider text-center my-3">or continue with</div>

            <button class="btn btn-outline-secondary w-100 mb-2">
              <img src="https://img.icons8.com/color/16/google-logo.png" />
              Google
            </button>

            <button class="btn btn-outline-secondary w-100">
              <img src="https://img.icons8.com/color/16/facebook-new.png" />
              Facebook
            </button>
          </div>
        </div>

        <!-- RIGHT -->
        <div class="col-lg-6 d-none d-lg-flex justify-content-center">
          <div class="right-card text-center w-100">
            <div
              id="loginCarousel"
              class="carousel slide"
              data-bs-ride="carousel"
            >
              <div class="carousel-inner">
                <div class="carousel-item active">
                  <div class="card-inner">
                    <h3>
                      Start your journey<br />by one click, explore<br />beautiful
                      world!
                    </h3>
                    <div class="image-glass">
                      <img
                        src="/images/car-sign.png"
                        class="img-fluid car-img"
                      />
                    </div>
                  </div>
                </div>

                <div class="carousel-item">
                  <div class="card-inner">
                    <h3>
                      Travel together,<br />share your ride,<br />save the
                      planet!
                    </h3>
                    <div class="image-glass">
                      <img
                        src="/images/car-sign.png"
                        class="img-fluid car-img"
                      />
                    </div>
                  </div>
                </div>

                <div class="carousel-item">
                  <div class="card-inner">
                    <h3>Easy booking,<br />safe journey,<br />happy travel!</h3>
                    <div class="image-glass">
                      <img
                        src="/images/car-sign.png"
                        class="img-fluid car-img"
                      />
                    </div>
                  </div>
                </div>
              </div>

              <!-- Dots -->
              <div class="carousel-indicators custom-dots">
                <button
                  type="button"
                  data-bs-target="#loginCarousel"
                  data-bs-slide-to="0"
                  class="active"
                ></button>
                <button
                  type="button"
                  data-bs-target="#loginCarousel"
                  data-bs-slide-to="1"
                ></button>
                <button
                  type="button"
                  data-bs-target="#loginCarousel"
                  data-bs-slide-to="2"
                ></button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
